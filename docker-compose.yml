services:
  mongo:
    image: mongo:7
    container_name: stoker-mongo
    ports:
      - "27017:27017"
    command: mongod --replSet rs0 --bind_ip_all
    environment:
      MONGO_INITDB_DATABASE: inventory_db
    volumes:
      - mongo_data:/data/db
    networks:
      - stoker-net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stoker-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/inventory_db
      CORS_ORIGINS: http://localhost:5173
      DEV_ALLOW_DB_FAIL: 1
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/backend/app
      - ./backend/.env:/app/backend/.env
    networks:
      - stoker-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stoker-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./frontend/index.html:/app/frontend/index.html
      - ./frontend/.env:/app/frontend/.env
    networks:
      - stoker-net
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local

networks:
  stoker-net:
    driver: bridge
